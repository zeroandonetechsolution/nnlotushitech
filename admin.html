<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NN Lotus Hi-Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 8rem auto 4rem;
            padding: 0 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        
        .stat-icon.pink {
            background: rgba(236, 72, 153, 0.1);
            color: var(--primary-pink);
        }

        .stat-info h3 {
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
        }

        .stat-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-glass);
        }

        th {
            background: rgba(0,0,0,0.2);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge.blue {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        
        .badge.pink {
            background: rgba(236, 72, 153, 0.2);
            color: #f472b6;
        }

        .status-paid {
            color: #10b981;
            font-weight: 600;
        }
        .status-paid::before {
            content: '●';
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <span>Admin <span class="highlight">Panel</span></span>
            </a>
            <a href="index.html" class="btn btn-secondary">Go to Live Site</a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="dashboard-header">
            <div>
                <h2>Overview <span class="gradient-text">Dashboard</span></h2>
                <p style="color:var(--text-muted)">Manage all incoming bookings and payments</p>
            </div>
            <button class="btn btn-outline" style="border-color: #ef4444; color: #ef4444;" onclick="clearAdminData()"><i class="fa-solid fa-trash"></i> Clear All Data</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon pink"><i class="fa-solid fa-wallet"></i></div>
                <div class="stat-info">
                    <h3 id="total-revenue">₹0</h3>
                    <p>Total Revenue</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="total-bookings">0</h3>
                    <p>Total Bookings</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color:#10b981; background:rgba(16,185,129,0.1)"><i class="fa-solid fa-chart-pie"></i></div>
                <div class="stat-info">
                    <h3>100%</h3>
                    <p>Payment Success</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date & Time</th>
                        <th>Customer Details</th>
                        <th>Service / Course</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
